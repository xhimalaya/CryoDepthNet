x-airflow-common: &airflow-common
  image: apache/airflow:3.2.0
  env_file:
    - .env

  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://Geouser:9632@192.168.1.8:5432/CryoDepthNetDb
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://Geouser:9632@192.168.1.8:5432/CryoDepthNetDb
    AIRFLOW_CONN_GLACIER_DB: postgresql://Geouser:9632@192.168.1.8:5432/GeoDb
    AIRFLOW__API__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_SECRET_KEY}
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.simple_auth_manager.manager.SimpleAuthManager
    AIRFLOW_SIMPLE_AUTH_MANAGER_USERS: "admin:admin"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./requirements.txt:/requirements.txt
  user: "${AIRFLOW_UID}:0"

services:
  redis:
    image: redis:7
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
    restart: always

  airflow:
    <<: *airflow-common
    # command: standalone
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped